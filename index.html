<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AymaneGramm</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- THÈME OLIVE & RESET --- */
        :root {
            --olive: #556B2F; /* Vert Olive stylé */
            --bg: #f8f9fa;
            --border: #e0e0e0;
            --text: #262626;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        #app { width: 100%; max-width: 480px; background: white; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        /* --- HEADER --- */
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: white; z-index: 10; }
        .logo { font-size: 24px; font-weight: 700; color: var(--olive); letter-spacing: -0.5px; }
        
        /* --- STORIES --- */
        .stories-container { display: flex; gap: 15px; padding: 15px; overflow-x: auto; border-bottom: 1px solid var(--border); background: white; flex-shrink: 0; }
        .stories-container::-webkit-scrollbar { display: none; }
        .story { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; min-width: 70px; }
        .story-img-wrapper { width: 68px; height: 68px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, var(--olive), #9acd32); }
        .story img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid white; background: #ccc; }
        .story span { font-size: 12px; font-weight: 400; }

        /* --- FEED (POSTS) --- */
        .feed { flex-grow: 1; overflow-y: auto; padding-bottom: 70px; background: var(--bg); }
        .post { background: white; margin-bottom: 15px; border-bottom: 1px solid var(--border); border-top: 1px solid var(--border); }
        .post-header { display: flex; align-items: center; padding: 12px 15px; gap: 10px; font-weight: 600; font-size: 14px; }
        .post-header img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .post-image { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; }
        .post-actions { padding: 10px 15px; display: flex; gap: 15px; }
        .post-actions svg { width: 24px; height: 24px; cursor: pointer; }
        .post-caption { padding: 0 15px 15px; font-size: 14px; line-height: 1.4; }
        .post-caption span { font-weight: 600; margin-right: 5px; }

        /* --- NAVIGATION --- */
        nav { position: absolute; bottom: 0; width: 100%; height: 60px; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 10; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { cursor: pointer; color: var(--text); padding: 10px; }
        .btn-add { background: var(--olive); color: white; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* --- MODAL POST --- */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; flex-direction: column; }
        .modal.active { display: flex; }
        .modal-header { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border); font-weight: 600; }
        .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; resize: none; font-size: 14px; }
        
        /* UTILITAIRES */
        .hidden { display: none !important; }
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="toast">Message</div>
<input type="file" id="file-input" accept="image/*" class="hidden">

<div id="app">
    <header>
        <div class="logo">AymaneGramm</div>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
    </header>

    <div class="stories-container" id="stories-list">
        <div class="story" onclick="triggerUpload('story')">
            <div class="story-img-wrapper" style="background: #e0e0e0;">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aymane" id="my-avatar">
            </div>
            <span>Ta story</span>
        </div>
        </div>

    <div class="feed" id="feed-list">
        <p style="text-align: center; margin-top: 50px; color: #888;">Chargement des posts...</p>
    </div>

    <nav>
        <div class="nav-item" onclick="location.reload()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <div class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <div class="btn-add" onclick="openPostModal()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <div class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
    </nav>

    <div id="modal-post" class="modal">
        <div class="modal-header">
            <span style="cursor:pointer;" onclick="closeModal()">Annuler</span>
            <span>Nouveau Post</span>
            <span style="color:var(--olive); cursor:pointer;" onclick="publishPost()">Partager</span>
        </div>
        <div class="modal-body">
            <div style="width: 100%; aspect-ratio: 1/1; background: #eee; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden;" onclick="triggerUpload('post')">
                <span id="post-placeholder" style="color: #888;">Appuie pour choisir une photo</span>
                <img id="post-preview" src="" class="hidden" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <textarea id="post-caption" rows="3" placeholder="Écris une légende (ex: 1er poste ta3i letss goo)..."></textarea>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION SUPABASE ---
    const SURL = "https://ymuoiyfyvqpxokndhsuz.supabase.co";
    const SKEY = "sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY";
    const supabase = window.supabase.createClient(SURL, SKEY);

    // Utilisateur fictif pour le test (On remplace l'auth complexe pour que ça marche direct)
    const mockUser = {
        id: "test-user-id", // À remplacer par user.id si tu mets un système de login
        username: "Aymane_Pro",
        avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Aymane"
    };

    let tempBase64 = null;
    let uploadMode = ''; // 'post' ou 'story'

    // --- INITIALISATION ---
    async function init() {
        loadPosts();
        loadStories();
    }

    // --- RECUPERATION DES POSTS ---
    async function loadPosts() {
        const feed = document.getElementById('feed-list');
        // On va chercher les posts dans la base de données
        const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
        
        if (error) {
            console.error(error);
            feed.innerHTML = `<p style="text-align: center; color: red;">Erreur: ${error.message}</p>`;
            return;
        }

        feed.innerHTML = '';
        if (data.length === 0) {
            feed.innerHTML = '<p style="text-align: center; padding: 40px; color: #888;">Sois le premier à poster !</p>';
        }

        data.forEach(post => {
            // Affichage avec la légende (caption) !
            feed.innerHTML += `
                <div class="post">
                    <div class="post-header">
                        <img src="${mockUser.avatar}" alt="avatar">
                        <span>${mockUser.username}</span>
                    </div>
                    <img src="${post.image_url}" class="post-image" alt="Post">
                    <div class="post-actions">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    </div>
                    <div class="post-caption">
                        <span>${mockUser.username}</span> ${post.caption || ''}
                    </div>
                </div>
            `;
        });
    }

    // --- RECUPERATION DES STORIES ---
    async function loadStories() {
        const container = document.getElementById('stories-list');
        const { data } = await supabase.from('stories').select('*').order('created_at', { ascending: false });
        
        // On garde la story de l'utilisateur (le premier élément) et on efface le reste
        const myStoryHTML = container.firstElementChild.outerHTML;
        container.innerHTML = myStoryHTML;

        data?.forEach((story, index) => {
            container.innerHTML += `
                <div class="story">
                    <div class="story-img-wrapper">
                        <img src="${story.image_url}">
                    </div>
                    <span>Story ${index + 1}</span>
                </div>
            `;
        });
    }

    // --- GESTION UPLOAD IMAGE (BASE64) ---
    function triggerUpload(mode) {
        uploadMode = mode;
        document.getElementById('file-input').click();
    }

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onloadend = function() {
            tempBase64 = reader.result;
            
            if (uploadMode === 'post') {
                document.getElementById('post-preview').src = tempBase64;
                document.getElementById('post-preview').classList.remove('hidden');
                document.getElementById('post-placeholder').classList.add('hidden');
            } else if (uploadMode === 'story') {
                publishStory(tempBase64);
            }
        };
        reader.readAsDataURL(file); // Convertit l'image en texte pour éviter l'erreur d'URL
    });

    // --- PUBLIER UN POST ---
    async function publishPost() {
        if (!tempBase64) return showToast("Veuillez sélectionner une image !");
        
        const captionText = document.getElementById('post-caption').value;
        showToast("Publication en cours...");

        // On insère l'image ET la caption dans la table 'posts'
        const { error } = await supabase.from('posts').insert([
            { image_url: tempBase64, caption: captionText }
        ]);

        if (error) {
            console.error(error);
            showToast("Erreur: " + error.message);
        } else {
            showToast("Publié avec succès !");
            closeModal();
            loadPosts(); // On recharge le feed
        }
    }

    // --- PUBLIER UNE STORY ---
    async function publishStory(base64Image) {
        showToast("Ajout à la story...");
        const { error } = await supabase.from('stories').insert([
            { image_url: base64Image }
        ]);
        
        if (!error) {
            showToast("Story ajoutée !");
            loadStories();
        }
    }

    // --- UTILITAIRES ---
    function openPostModal() {
        document.getElementById('modal-post').classList.add('active');
    }
    
    function closeModal() {
        document.getElementById('modal-post').classList.remove('active');
        document.getElementById('post-preview').classList.add('hidden');
        document.getElementById('post-placeholder').classList.remove('hidden');
        document.getElementById('post-caption').value = '';
        tempBase64 = null;
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    // Lancement au démarrage
    init();

</script>
</body>
</html>
