<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aymane Social Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#111;
      color:#fff;
      margin:0;
      padding:20px;
    }
    .box{
      max-width:600px;
      margin:0 auto;
      background:#1b1b1b;
      padding:20px;
      border-radius:16px;
    }
    input,button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #333;
      box-sizing:border-box;
      font-size:16px;
    }
    button{
      background:#6c5ce7;
      color:white;
      border:none;
      cursor:pointer;
    }
    .hidden{display:none}
    .status{
      margin-top:14px;
      white-space:pre-wrap;
      color:#ffd166;
    }
  </style>
</head>
<body>
  <div class="box">
    <div id="loginView">
      <h1>Connexion</h1>
      <input id="loginEmail" type="email" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Mot de passe">
      <button id="loginBtn">Se connecter</button>
      <button id="goSignupBtn">S'inscrire</button>
      <div id="loginStatus" class="status">Prêt</div>
    </div>

    <div id="signupView" class="hidden">
      <h1>Inscription</h1>
      <input id="signupEmail" type="email" placeholder="Email">
      <input id="signupPassword" type="password" placeholder="Mot de passe">
      <button id="signupBtn">Créer le compte</button>
      <button id="backLoginBtn">Retour connexion</button>
      <div id="signupStatus" class="status">Prêt</div>
    </div>

    <div id="usernameView" class="hidden">
      <h1>Choisir pseudo</h1>
      <input id="usernameInput" placeholder="Pseudo">
      <button id="saveUsernameBtn">Enregistrer pseudo</button>
      <button id="logoutBtn1">Déconnexion</button>
      <div id="usernameStatus" class="status">Prêt</div>
    </div>

    <div id="homeView" class="hidden">
      <h1>Accueil</h1>
      <p>Email : <span id="homeEmail"></span></p>
      <p>Pseudo : <span id="homeUsername"></span></p>
      <button id="editUsernameBtn">Modifier pseudo</button>
      <button id="logoutBtn2">Déconnexion</button>
      <div id="homeStatus" class="status">Prêt</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ymuoiyfyvqpxokndhsuz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY";
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let currentProfile = null;

    const loginView = document.getElementById("loginView");
    const signupView = document.getElementById("signupView");
    const usernameView = document.getElementById("usernameView");
    const homeView = document.getElementById("homeView");

    const loginStatus = document.getElementById("loginStatus");
    const signupStatus = document.getElementById("signupStatus");
    const usernameStatus = document.getElementById("usernameStatus");
    const homeStatus = document.getElementById("homeStatus");

    function setStatus(el, text){
      el.textContent = text;
      console.log(text);
    }

    function showOnly(view){
      loginView.classList.add("hidden");
      signupView.classList.add("hidden");
      usernameView.classList.add("hidden");
      homeView.classList.add("hidden");
      view.classList.remove("hidden");
    }

    async function signup(){
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;

      if(!email || !password){
        setStatus(signupStatus, "remplis les champs");
        return;
      }

      setStatus(signupStatus, "étape 1 : début inscription");

      try{
        const { error } = await client.auth.signUp({ email, password });

        if(error){
          setStatus(signupStatus, "erreur inscription : " + error.message);
          return;
        }

        setStatus(signupStatus, "étape 2 : compte créé, retourne te connecter");
        document.getElementById("loginEmail").value = email;
        document.getElementById("loginPassword").value = password;
      }catch(e){
        setStatus(signupStatus, "erreur JS inscription : " + e.message);
      }
    }

    async function login(){
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      if(!email || !password){
        setStatus(loginStatus, "entre email et mot de passe");
        return;
      }

      setStatus(loginStatus, "étape 1 : début connexion");

      try{
        const { error } = await client.auth.signInWithPassword({ email, password });

        if(error){
          setStatus(loginStatus, "erreur connexion : " + error.message);
          return;
        }

        setStatus(loginStatus, "étape 2 : connexion réussie");
      }catch(e){
        setStatus(loginStatus, "erreur JS connexion : " + e.message);
      }
    }

    async function logout(){
      try{
        await client.auth.signOut();
        currentUser = null;
        currentProfile = null;
        showOnly(loginView);
        setStatus(loginStatus, "déconnecté");
      }catch(e){
        setStatus(homeStatus, "erreur logout : " + e.message);
      }
    }

    async function loadMyProfile(){
      setStatus(usernameStatus, "étape 3 : recherche profil");

      const { data, error } = await client
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .maybeSingle();

      if(error){
        setStatus(usernameStatus, "erreur profil : " + error.message);
        return false;
      }

      if(!data){
        currentProfile = null;
        setStatus(usernameStatus, "profil absent");
        showOnly(usernameView);
        return false;
      }

      currentProfile = data;
      document.getElementById("homeEmail").textContent = currentUser.email || "";
      document.getElementById("homeUsername").textContent = currentProfile.username || "";
      setStatus(homeStatus, "profil trouvé");
      showOnly(homeView);
      return true;
    }

    async function saveUsername(){
      const username = document.getElementById("usernameInput").value.trim().toLowerCase();

      if(!username){
        setStatus(usernameStatus, "entre un pseudo");
        return;
      }

      setStatus(usernameStatus, "étape 4 : enregistrement pseudo");

      try{
        if(!currentProfile){
          const { error } = await client
            .from("profiles")
            .insert({
              id: currentUser.id,
              username: username
            });

          if(error){
            setStatus(usernameStatus, "erreur insert pseudo : " + error.message);
            return;
          }
        }else{
          const { error } = await client
            .from("profiles")
            .update({ username: username })
            .eq("id", currentUser.id);

          if(error){
            setStatus(usernameStatus, "erreur update pseudo : " + error.message);
            return;
          }
        }

        setStatus(usernameStatus, "pseudo enregistré");
        await loadMyProfile();
      }catch(e){
        setStatus(usernameStatus, "erreur JS pseudo : " + e.message);
      }
    }

    client.auth.onAuthStateChange(async (_event, session) => {
      if(session && session.user){
        currentUser = session.user;
        setStatus(loginStatus, "connexion détectée par session");
        await loadMyProfile();
      }else{
        showOnly(loginView);
      }
    });

    async function init(){
      setStatus(loginStatus, "init...");
      try{
        const { data } = await client.auth.getSession();

        if(data.session && data.session.user){
          currentUser = data.session.user;
          setStatus(loginStatus, "session déjà active");
          await loadMyProfile();
        }else{
          setStatus(loginStatus, "aucune session");
          showOnly(loginView);
        }
      }catch(e){
        setStatus(loginStatus, "erreur init : " + e.message);
      }
    }

    document.getElementById("goSignupBtn").addEventListener("click", () => {
      showOnly(signupView);
      setStatus(signupStatus, "écran inscription");
    });

    document.getElementById("backLoginBtn").addEventListener("click", () => {
      showOnly(loginView);
      setStatus(loginStatus, "écran connexion");
    });

    document.getElementById("signupBtn").addEventListener("click", signup);
    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("saveUsernameBtn").addEventListener("click", saveUsername);
    document.getElementById("editUsernameBtn").addEventListener("click", () => {
      showOnly(usernameView);
      setStatus(usernameStatus, "modifie ton pseudo");
    });
    document.getElementById("logoutBtn1").addEventListener("click", logout);
    document.getElementById("logoutBtn2").addEventListener("click", logout);

    init();
  </script>
</body>
</html>
