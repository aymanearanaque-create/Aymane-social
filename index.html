<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test final</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px;
    }
    button {
      padding: 14px 20px;
      margin: 10px 0;
      display: block;
      border: none;
      border-radius: 10px;
      background: #7c6af7;
      color: white;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Test boutons</h1>

  <button id="btn1">Bouton 1</button>
  <button id="btn2">Bouton 2</button>
  <button id="btn3">Bouton 3</button>

  <script>
    document.getElementById("btn1").addEventListener("click", function () {
      alert("Bouton 1 OK");
    });

    document.getElementById("btn2").addEventListener("click", function () {
      alert("Bouton 2 OK");
    });

    document.getElementById("btn3").addEventListener("click", function () {
      document.body.innerHTML += "<p>JavaScript fonctionne vraiment</p>";
    });
  </script>
</body>
</html>
