<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aymane Social</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
background:#0a0a0f;
color:white;
font-family:Arial;
padding:30px;
}

input{
display:block;
margin:10px 0;
padding:10px;
width:250px;
}

button{
padding:12px;
background:#7c6af7;
color:white;
border:none;
border-radius:8px;
margin:5px 0;
cursor:pointer;
}
</style>

</head>
<body>

<h1>Aymane Social</h1>

<h3>Inscription</h3>

<input id="email" placeholder="email">
<input id="password" placeholder="mot de passe">
<button id="signup">Créer compte</button>

<h3>Connexion</h3>

<button id="login">Se connecter</button>

<h3>Session</h3>

<button id="logout">Se déconnecter</button>

<div id="status"></div>

<script>

const SUPABASE_URL = "https://ymuoiyfyvqpxokndhsuz.supabase.co";
const SUPABASE_KEY = "sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY";

const supabase = window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const status = document.getElementById("status");

document.getElementById("signup").addEventListener("click", async ()=>{

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const {error} = await supabase.auth.signUp({email,password});

if(error){
status.innerText = error.message;
}else{
status.innerText = "Compte créé";
}

});

document.getElementById("login").addEventListener("click", async ()=>{

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const {error} = await supabase.auth.signInWithPassword({email,password});

if(error){
status.innerText = error.message;
}else{
status.innerText = "Connecté";
}

});

document.getElementById("logout").addEventListener("click", async ()=>{

await supabase.auth.signOut();

status.innerText = "Déconnecté";

});

</script>

</body>
</html>
