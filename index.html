<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AymaneGramm Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- THÈME OLIVE & CONFIGURATION CSS --- */
        :root {
            --olive: rgb(128, 128, 0);
            --olive-dark: rgb(100, 100, 0);
            --olive-light: rgba(128, 128, 0, 0.1);
            --bg: #fafafa;
            --border: #dbdbdb;
            --text: #262626;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; display: flex; justify-content: center; }

        #app-container {
            width: 100%; max-width: 450px; height: 100%; background: var(--white);
            position: relative; display: flex; flex-direction: column;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            height: 60px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; flex-shrink: 0; background: var(--white); z-index: 10;
        }
        .logo { font-size: 22px; font-weight: 800; color: var(--olive); letter-spacing: -1px; }

        nav {
            height: 60px; border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            background: var(--white); padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-icon { cursor: pointer; color: var(--text); transition: 0.2s; }
        .nav-icon.active { color: var(--olive); }

        /* --- ÉCRANS --- */
        .screen { flex-grow: 1; overflow-y: auto; display: none; padding-bottom: 20px; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- STORIES --- */
        .stories-container {
            display: flex; gap: 12px; padding: 15px; border-bottom: 1px solid var(--border);
            overflow-x: auto; scrollbar-width: none;
        }
        .story { display: flex; flex-direction: column; align-items: center; min-width: 70px; gap: 5px; }
        .story-circle {
            width: 66px; height: 66px; border-radius: 50%; padding: 2px;
            background: linear-gradient(45deg, var(--olive), #f09433);
            display: flex; align-items: center; justify-content: center;
        }
        .story-circle img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        .story span { font-size: 11px; max-width: 65px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* --- POSTS --- */
        .post { margin-bottom: 20px; border-bottom: 1px solid #eee; }
        .post-header { display: flex; align-items: center; padding: 10px 15px; gap: 10px; }
        .post-header img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .post-img { width: 100%; aspect-ratio: 1/1; background: #efefef; object-fit: cover; }
        .post-info { padding: 12px 15px; }
        .post-user { font-weight: 700; font-size: 14px; margin-right: 5px; }
        .post-cap { font-size: 14px; line-height: 1.4; }

        /* --- PROFILE --- */
        .prof-top { padding: 20px 15px; display: flex; align-items: center; gap: 25px; }
        .prof-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        .prof-details { flex-grow: 1; }
        .prof-user { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
        .prof-edit-btn { 
            padding: 8px; width: 100%; border: 1px solid var(--border); 
            border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
        }

        /* --- MESSAGERIE --- */
        .chat-item { display: flex; align-items: center; padding: 15px; gap: 15px; cursor: pointer; }
        .chat-item:active { background: #f0f0f0; }

        /* --- MODALES & OVERLAYS --- */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 100; display: none; flex-direction: column;
            transform: translateY(100%); transition: 0.3s ease-in-out;
        }
        .overlay.active { display: flex; transform: translateY(0); }
        .ov-header { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        
        /* --- BUTTONS & INPUTS --- */
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; background: #fafafa; }
        .btn-primary { background: var(--olive); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; width: 100%; cursor: pointer; }
        
        .upload-zone {
            width: 100%; aspect-ratio: 1/1; border: 2px dashed var(--border); 
            border-radius: 12px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; cursor: pointer; margin-bottom: 20px;
        }
        .preview-img { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 10px; }

        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 20px;
            font-size: 13px; z-index: 1000; display: none;
        }
    </style>
</head>
<body>

<div id="toast">Message</div>
<input type="file" id="file-input" accept="image/*" style="display:none">

<div id="app-container">
    <div id="screen-auth" class="screen active" style="display: flex; flex-direction: column; justify-content: center; padding: 40px;">
        <h1 class="logo" style="text-align: center; font-size: 35px; margin-bottom: 30px;">AymaneGramm</h1>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pwd" placeholder="Mot de passe">
        <button class="btn-primary" onclick="handleAuth()">Se connecter / S'inscrire</button>
    </div>

    <div id="main-app" style="display:none; flex-direction: column; height: 100%;">
        <header>
            <div class="logo">AymaneGramm</div>
            <div onclick="openOverlay('ov-messages')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            </div>
        </header>

        <div id="screen-home" class="screen active">
            <div class="stories-container" id="list-stories">
                <div class="story" onclick="triggerUpload('story')">
                    <div class="story-circle" style="background: var(--border)"><img src="https://via.placeholder.com/100" id="my-story-img"></div>
                    <span>Votre story</span>
                </div>
                <div id="other-stories" style="display: flex; gap: 12px;"></div>
            </div>
            <div id="feed">
                <p style="text-align:center; padding:50px; color:#888;">Chargement du fil d'actualité...</p>
            </div>
        </div>

        <div id="screen-search" class="screen">
            <div style="padding: 15px;">
                <input type="text" placeholder="Rechercher un utilisateur..." oninput="searchUsers(this.value)">
                <div id="search-results"></div>
            </div>
        </div>

        <div id="screen-profile" class="screen">
            <div class="prof-top">
                <img src="" id="user-avatar" class="prof-avatar">
                <div class="prof-details">
                    <div class="prof-user" id="user-name">Utilisateur</div>
                    <button class="prof-edit-btn" onclick="openOverlay('ov-edit-profile')">Modifier le profil</button>
                </div>
            </div>
            <div id="user-posts-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;"></div>
        </div>

        <nav>
            <div class="nav-icon active" onclick="showTab('home', this)"><svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
            <div class="nav-icon" onclick="showTab('search', this)"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>
            <div class="nav-icon" onclick="openOverlay('ov-post')"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg></div>
            <div class="nav-icon" onclick="showTab('profile', this)"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        </nav>
    </div>

    <div id="ov-post" class="overlay">
        <div class="ov-header">
            <span onclick="closeOverlay('ov-post')">Annuler</span>
            <span style="font-weight:700">Nouveau Post</span>
            <span style="color:var(--olive); font-weight:700" onclick="publishPost()">Partager</span>
        </div>
        <div style="padding: 20px;">
            <div class="upload-zone" onclick="triggerUpload('post')">
                <div id="post-placeholder">Toucher pour ajouter une photo</div>
                <img id="post-preview" class="preview-img">
            </div>
            <textarea id="post-caption" placeholder="Écrire une légende..." rows="4"></textarea>
        </div>
    </div>

    <div id="ov-edit-profile" class="overlay">
        <div class="ov-header">
            <span onclick="closeOverlay('ov-edit-profile')">Annuler</span>
            <span style="font-weight:700">Modifier Profil</span>
            <span style="color:var(--olive); font-weight:700" onclick="saveProfile()">Enregistrer</span>
        </div>
        <div style="padding: 20px; text-align: center;">
            <img src="" id="edit-avatar-preview" class="prof-avatar" style="margin-bottom: 10px;">
            <p style="color:var(--olive); font-size: 14px; margin-bottom: 20px; cursor: pointer;" onclick="triggerUpload('avatar')">Changer la photo</p>
            <input type="text" id="edit-username" placeholder="Nom d'utilisateur">
        </div>
    </div>

    <div id="ov-messages" class="overlay">
        <div class="ov-header">
            <span onclick="closeOverlay('ov-messages')">Retour</span>
            <span style="font-weight:700">Direct</span>
            <div style="width:40px"></div>
        </div>
        <div id="messages-list">
             <p style="text-align:center; padding:50px; color:#888;">Recherchez un utilisateur pour discuter.</p>
        </div>
    </div>
</div>

<script>
    // CONFIG SUPABASE
    const SURL = "https://ymuoiyfyvqpxokndhsuz.supabase.co";
    const SKEY = "sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY";
    const supabase = window.supabase.createClient(SURL, SKEY);

    let user = null;
    let tempImg = null;
    let currentUploadType = '';

    // AUTH
    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-pwd').value;
        
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) {
            const { data: logData, error: logErr } = await supabase.auth.signInWithPassword({ email, password });
            if (logErr) return toast("Erreur: " + logErr.message);
            user = logData.user;
        } else {
            user = data.user;
            await supabase.from('profiles').insert([{ id: user.id, username: email.split('@')[0] }]);
        }
        startApp();
    }

    async function startApp() {
        document.getElementById('screen-auth').style.display = 'none';
        document.getElementById('main-app').style.display = 'flex';
        loadProfile();
        loadFeed();
        loadStories();
    }

    // GESTION IMAGES (Conversion Base64 pour éviter URLs)
    function triggerUpload(type) {
        currentUploadType = type;
        document.getElementById('file-input').click();
    }

    document.getElementById('file-input').onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function() {
            tempImg = reader.result;
            if (currentUploadType === 'post') {
                document.getElementById('post-preview').src = tempImg;
                document.getElementById('post-preview').style.display = 'block';
                document.getElementById('post-placeholder').style.display = 'none';
            } else if (currentUploadType === 'avatar') {
                document.getElementById('edit-avatar-preview').src = tempImg;
            } else if (currentUploadType === 'story') {
                uploadStory(tempImg);
            }
        };
        reader.readAsDataURL(file);
    };

    // LOGIQUE PUBLICATION (Table posts avec colonnes caption et image_url)
    async function publishPost() {
        if (!tempImg) return toast("Choisis une image !");
        const cap = document.getElementById('post-caption').value;
        
        toast("Publication...");
        const { error } = await supabase.from('posts').insert([
            { user_id: user.id, image_url: tempImg, caption: cap }
        ]);

        if (error) {
            console.error(error);
            toast("Erreur DB: As-tu ajouté la colonne 'caption' ?");
        } else {
            toast("Publié !");
            closeOverlay('ov-post');
            loadFeed();
        }
    }

    async function loadFeed() {
        const { data, error } = await supabase.from('posts').select('*, profiles(username, avatar_url)').order('created_at', { ascending: false });
        const feed = document.getElementById('feed');
        feed.innerHTML = '';
        
        if (data.length === 0) feed.innerHTML = '<p style="text-align:center; padding:50px; color:#888;">Aucune story pour le moment</p>';

        data.forEach(p => {
            feed.innerHTML += `
                <div class="post">
                    <div class="post-header">
                        <img src="${p.profiles.avatar_url || 'https://via.placeholder.com/50'}">
                        <span style="font-weight:700">${p.profiles.username}</span>
                    </div>
                    <img class="post-img" src="${p.image_url}">
                    <div class="post-info">
                        <span class="post-user">${p.profiles.username}</span>
                        <span class="post-cap">${p.caption || ''}</span>
                    </div>
                </div>
            `;
        });
    }

    // PROFIL & STORIES
    async function loadProfile() {
        const { data } = await supabase.from('profiles').select('*').eq('id', user.id).single();
        document.getElementById('user-name').innerText = data.username;
        document.getElementById('user-avatar').src = data.avatar_url || 'https://via.placeholder.com/150';
        document.getElementById('edit-avatar-preview').src = data.avatar_url || 'https://via.placeholder.com/150';
        document.getElementById('edit-username').value = data.username;
    }

    async function saveProfile() {
        const username = document.getElementById('edit-username').value;
        await supabase.from('profiles').update({ username, avatar_url: tempImg || undefined }).eq('id', user.id);
        toast("Profil mis à jour");
        loadProfile();
        closeOverlay('ov-edit-profile');
    }

    async function uploadStory(img) {
        toast("Ajout à la story...");
        await supabase.from('stories').insert([{ user_id: user.id, image_url: img }]);
        loadStories();
    }

    async function loadStories() {
        const { data } = await supabase.from('stories').select('*, profiles(username, avatar_url)');
        const container = document.getElementById('other-stories');
        container.innerHTML = '';
        data?.forEach(s => {
            container.innerHTML += `
                <div class="story">
                    <div class="story-circle"><img src="${s.image_url}"></div>
                    <span>${s.profiles.username}</span>
                </div>
            `;
        });
    }

    // UI HELPERS
    function showTab(tab, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
        document.getElementById('screen-' + tab).classList.add('active');
        el.classList.add('active');
    }

    function openOverlay(id) { document.getElementById(id).classList.add('active'); }
    function closeOverlay(id) { document.getElementById(id).classList.remove('active'); tempImg = null; }
    function toast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }
</script>

</body>
</html>
