<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Aymane Social</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--olive:rgb(128,128,0);
--bg:#f6f6e7;
--card:white;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
}

.topbar{
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:26px;
color:var(--olive);
border-bottom:1px solid #ddd;
background:white;
}

.page{
padding:15px;
padding-bottom:80px;
}

.hidden{display:none}

.card{
background:white;
border-radius:15px;
padding:15px;
margin-bottom:10px;
border:1px solid #ddd;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
margin-top:6px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:var(--olive);
color:white;
font-weight:bold;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:white;
border-top:1px solid #ddd;
display:grid;
grid-template-columns:repeat(5,1fr);
}

.navbtn{
background:none;
border:none;
font-size:12px;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:var(--olive);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
overflow:hidden;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.profileRow{
display:flex;
gap:15px;
align-items:center;
}

</style>
</head>

<body>

<div class="topbar">Aymane Social</div>

<div id="loginPage" class="page">

<div class="card">

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Connexion</button>
<button onclick="signup()">Inscription</button>

</div>

</div>

<div id="usernamePage" class="page hidden">

<div class="card">

<input id="username" placeholder="choisir pseudo">

<button onclick="saveUsername()">Enregistrer pseudo</button>

</div>

</div>

<div id="homePage" class="page hidden">

<div class="card">Accueil Instagram prêt</div>

</div>

<div id="searchPage" class="page hidden">

<div class="card">

<input id="searchInput" placeholder="chercher pseudo">

<button onclick="searchUser()">Rechercher</button>

</div>

<div id="results"></div>

</div>

<div id="profilePage" class="page hidden">

<div class="card">

<div class="profileRow">

<div id="avatar" class="avatar">A</div>

<div>

<div id="usernameText"></div>

<div>

<span id="followers">0</span> followers

</div>

</div>

</div>

</div>

</div>

<div class="bottom">

<button class="navbtn" onclick="nav('homePage')">Accueil</button>

<button class="navbtn" onclick="nav('searchPage')">Recherche</button>

<button class="navbtn">Messages</button>

<button class="navbtn">Reels</button>

<button class="navbtn" onclick="nav('profilePage')">Profil</button>

</div>

<script>

const supabase=supabase.createClient(
"https://ymuoiyfyvqpxokndhsuz.supabase.co",
"sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY"
)

let user

function nav(p){

document.querySelectorAll(".page").forEach(e=>e.classList.add("hidden"))

document.getElementById(p).classList.remove("hidden")

}

async function signup(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

await supabase.auth.signUp({email,password})

alert("compte créé")

}

async function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

let {data}=await supabase.auth.signInWithPassword({email,password})

user=data.user

checkProfile()

}

async function checkProfile(){

let {data}=await supabase
.from("profiles")
.select("*")
.eq("id",user.id)
.single()

if(!data){

nav("usernamePage")

}else{

loadProfile(data)

nav("homePage")

}

}

async function saveUsername(){

let username=document.getElementById("username").value

await supabase
.from("profiles")
.insert({id:user.id,username})

checkProfile()

}

function loadProfile(p){

document.getElementById("usernameText").innerText="@"+p.username

document.getElementById("avatar").innerText=p.username[0]

}

async function searchUser(){

let q=document.getElementById("searchInput").value

let {data}=await supabase
.from("profiles")
.select("*")
.ilike("username","%"+q+"%")

let div=document.getElementById("results")

div.innerHTML=""

data.forEach(u=>{

div.innerHTML+=`

<div class="card">

<b>@${u.username}</b>

<button onclick="openProfile('${u.id}')">voir profil</button>

</div>

`

})

}

async function openProfile(id){

let {data}=await supabase
.from("profiles")
.select("*")
.eq("id",id)
.single()

loadProfile(data)

nav("profilePage")

}

</script>

</body>
</html>
