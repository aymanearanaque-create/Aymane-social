<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aymane Social</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* === VARIABLES & RESET === */
        :root {
            --primary: #0095f6;
            --primary-light: #e0f1ff;
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --text-dark: #262626;
            --text-muted: #8e8e8e;
            --border-color: #dbdbdb;
            --input-bg: #efefef;
            --nav-height: 50px;
            --top-height: 60px;
            --radius-md: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; height: 100dvh; background-color: #dbdbdb; display: flex; justify-content: center; overflow: hidden; color: var(--text-dark); }

        /* === APP CONTAINER === */
        #app-container { width: 100%; max-width: 430px; height: 100%; height: 100dvh; background-color: var(--card-bg); position: relative; display: flex; flex-direction: column; overflow: hidden; }

        /* === NOTIFS === */
        #status-bar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%) translateY(-150%); padding: 12px 20px; background: rgba(38, 38, 38, 0.9); color: white; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 9999; transition: transform 0.3s; white-space: nowrap; }
        #status-bar.visible { transform: translateX(-50%) translateY(0); }
        #status-bar.error { background: #ed4956; }

        /* === SCREENS === */
        .screen { display: none; flex-direction: column; height: 100%; width: 100%; background: var(--card-bg); }
        .screen.active { display: flex; }

        /* === AUTH === */
        .auth-container { padding: 40px 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .auth-logo { font-size: 32px; font-family: cursive; font-weight: bold; margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--card-bg); font-size: 14px; outline: none; }
        input:focus, textarea:focus { border-color: var(--text-muted); }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; cursor: pointer; }
        button.secondary { background: transparent; color: var(--primary); border: 1px solid var(--border-color); }
        button.text-only { background: transparent; color: var(--text-muted); font-weight: 500; margin-top: 15px; }

        /* === MAIN APP === */
        #top-bar { height: var(--top-height); background: var(--card-bg); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 16px; font-weight: 700; font-size: 24px; font-family: cursive; flex-shrink: 0; z-index: 10; justify-content: space-between;}
        #content-area { flex-grow: 1; overflow-y: auto; background: var(--bg-color); }
        
        #bottom-nav { height: var(--nav-height); background: var(--card-bg); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { cursor: pointer; padding: 10px; color: var(--text-dark); transition: transform 0.2s; }
        .nav-item:active { transform: scale(0.9); }
        .nav-item svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; }
        .nav-item.active svg { fill: currentColor; }

        .tab-content { display: none; padding: 0; animation: fadeIn 0.2s ease; background: var(--card-bg); min-height: 100%; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* === FEED (ACCUEIL) === */
        .post-card { border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 15px; background: var(--card-bg); }
        .post-header { display: flex; align-items: center; padding: 10px 15px; cursor: pointer; }
        .post-header .avatar { width: 32px; height: 32px; border-radius: 50%; margin-right: 10px; object-fit: cover; border: 1px solid var(--border-color); }
        .post-header .username { font-weight: 600; font-size: 14px; }
        .post-image { width: 100%; max-height: 500px; object-fit: cover; background: var(--input-bg); }
        .post-actions { padding: 10px 15px; display: flex; gap: 15px; }
        .post-actions svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; cursor: pointer; }
        .post-caption { padding: 0 15px; font-size: 14px; line-height: 1.4; }
        .post-date { padding: 5px 15px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; }

        /* === PROFIL === */
        .profile-padding { padding: 16px; }
        .profile-header { display: flex; align-items: center; margin-bottom: 16px; }
        .avatar.large { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-right: 20px; border: 1px solid var(--border-color); }
        
        .profile-stats-container { flex-grow: 1; display: flex; justify-content: space-around; text-align: center; }
        .stat-num { font-weight: 700; font-size: 16px; }
        .stat-label { font-size: 13px; color: var(--text-dark); }
        
        .profile-bio { font-size: 14px; margin-bottom: 16px; line-height: 1.4; }
        .profile-bio strong { display: block; margin-bottom: 2px; }

        .edit-profile-btn { width: 100%; padding: 8px; background: var(--input-bg); color: var(--text-dark); font-weight: 600; border-radius: var(--radius-md); text-align: center; cursor: pointer; margin-bottom: 20px; font-size: 14px;}
        
        /* SEARCH / USERS */
        .search-bar { position: relative; margin-bottom: 16px; padding: 16px 16px 0 16px;}
        .search-bar input { background: var(--input-bg); border: none; border-radius: 10px; padding-left: 36px; }
        .search-bar svg { position: absolute; left: 26px; top: 28px; width: 16px; height: 16px; color: var(--text-muted); }
        .search-results-list { padding: 0 16px; }
        .user-row { display: flex; align-items: center; padding: 10px 0; cursor: pointer; border-bottom: 1px solid var(--bg-color); }
        .user-row .avatar { margin-right: 12px; width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .user-row .user-info { flex-grow: 1; }
        .user-row .username { font-weight: 600; font-size: 14px; }
        .user-row .fullname { font-size: 13px; color: var(--text-muted); }

        /* GRILLE DE POSTS (PROFIL) */
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .post-square { aspect-ratio: 1; background: var(--input-bg); cursor: pointer; position: relative; }
        .post-square img { width: 100%; height: 100%; object-fit: cover; }

        /* OVERLAYS */
        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--card-bg); z-index: 200; display: none; flex-direction: column; }
        .overlay.active { display: flex; }
        .overlay-header { height: 50px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 16px; font-weight: 600; font-size: 16px; justify-content: space-between; }
        .back-btn { cursor: pointer; display: flex; align-items: center; width: 40px; }
        .overlay-content { flex-grow: 1; overflow-y: auto; }
        
        /* NEW POST MODAL */
        #create-post-preview { width: 100%; max-height: 300px; object-fit: contain; background: var(--input-bg); display: none; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="status-bar"></div>

    <div id="auth-screen" class="screen active">
        <div class="auth-container" id="view-login">
            <div class="auth-logo">AymaneSocial</div>
            <input type="email" id="login-email" placeholder="Email" />
            <input type="password" id="login-password" placeholder="Mot de passe" />
            <button onclick="login()">Se connecter</button>
            <div style="margin: 20px 0; color: var(--text-muted); font-size: 14px;">OU</div>
            <button class="text-only" onclick="switchAuthView('view-signup')" style="color: var(--primary); font-weight: 600;">Créer un nouveau compte</button>
        </div>

        <div class="auth-container" id="view-signup" style="display: none;">
            <div class="auth-logo">AymaneSocial</div>
            <input type="email" id="signup-email" placeholder="Email" />
            <input type="password" id="signup-password" placeholder="Mot de passe" />
            <button onclick="startSignup()">S'inscrire</button>
            <button class="text-only" onclick="switchAuthView('view-login')">Retour à la connexion</button>
        </div>

        <div class="auth-container" id="view-otp" style="display: none;">
            <div class="auth-logo">Vérification</div>
            <p style="text-align: center; font-size: 14px; margin-bottom: 20px;">Un code a été envoyé à ton email.</p>
            <input type="text" id="otp-code" placeholder="000000" maxlength="6" style="text-align: center; font-size: 24px; letter-spacing: 10px;" />
            <button onclick="verifyOtp()">Vérifier</button>
        </div>
    </div>

    <div id="setup-profile-screen" class="screen">
        <div class="auth-container">
            <div class="auth-logo" style="font-family: sans-serif; font-size: 24px;">Ton Profil</div>
            <input type="text" id="setup-username" placeholder="Nom d'utilisateur (ex: aymane_pro)" />
            <button onclick="saveUsername()">Continuer</button>
        </div>
    </div>

    <div id="main-app" class="screen">
        <header id="top-bar">
            <span>AymaneSocial</span>
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        </header>
        
        <main id="content-area">
            <div id="tab-accueil" class="tab-content active" style="background: var(--bg-color);">
                <div id="feed-container">
                    </div>
            </div>

            <div id="tab-recherche" class="tab-content">
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" placeholder="Rechercher" oninput="searchUsers()">
                </div>
                <div id="search-results" class="search-results-list"></div>
            </div>

            <div id="tab-profil" class="tab-content">
                <div class="profile-padding">
                    <div class="profile-header">
                        <img id="my-avatar-preview" class="avatar large" src="">
                        <div class="profile-stats-container">
                            <div><div class="stat-num" id="my-stat-posts">0</div><div class="stat-label">Posts</div></div>
                            <div><div class="stat-num" id="my-stat-followers">0</div><div class="stat-label">Abonnés</div></div>
                            <div><div class="stat-num" id="my-stat-following">0</div><div class="stat-label">Suivis</div></div>
                        </div>
                    </div>

                    <div class="profile-bio">
                        <strong id="my-profile-username">pseudo</strong>
                        <span id="my-profile-bio"></span>
                    </div>

                    <div class="edit-profile-btn" onclick="openOverlay('edit-profile-overlay')">Modifier le profil</div>
                </div>
                <div class="post-grid" id="my-post-grid"></div>
            </div>
        </main>

        <nav id="bottom-nav">
            <div class="nav-item active" onclick="switchTab('accueil', this)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg></div>
            <div class="nav-item" onclick="switchTab('recherche', this)"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></div>
            <div class="nav-item" onclick="openCreatePostOverlay()"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></div>
            <div class="nav-item" onclick="switchTab('profil', this)">
                <img id="nav-my-avatar" class="avatar" style="width:26px; height:26px; border-radius:50%; border: 1px solid var(--border-color); object-fit:cover;" src="">
            </div>
        </nav>
    </div>

    <div id="create-post-overlay" class="overlay">
        <header class="overlay-header">
            <div class="back-btn" onclick="closeOverlay('create-post-overlay')"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></div>
            <div>Nouveau post</div>
            <div style="color:var(--primary); font-weight:600; cursor:pointer;" onclick="publishPost()">Partager</div>
        </header>
        <div class="overlay-content" style="padding: 16px;">
            <input type="file" id="post-image-upload" accept="image/*" style="display: none;" onchange="handlePostImageSelect(event)">
            <button class="secondary" onclick="document.getElementById('post-image-upload').click()" style="margin-bottom: 15px;">Choisir une photo</button>
            <img id="create-post-preview" src="">
            <textarea id="post-caption" placeholder="Écris une légende..." rows="4" style="border:none; border-bottom:1px solid var(--border-color); border-radius:0; resize:none; padding-left:0; background:transparent;"></textarea>
        </div>
    </div>

    <div id="edit-profile-overlay" class="overlay">
        <header class="overlay-header">
            <div class="back-btn" onclick="closeOverlay('edit-profile-overlay')"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></div>
            <div>Modifier le profil</div>
            <div style="color:var(--primary); font-weight:600; cursor:pointer;" onclick="saveFullProfile()">Terminer</div>
        </header>
        <div class="overlay-content" style="display:flex; flex-direction:column; align-items:center; padding:16px;">
            <img id="edit-avatar-preview" class="avatar large" style="margin: 20px 0 10px 0;" src="">
            <input type="file" id="avatar-upload" accept="image/*" style="display: none;" onchange="handlePhotoUpload(event)">
            <div style="color:var(--primary); font-weight:600; font-size:14px; margin-bottom: 20px; cursor:pointer;" onclick="document.getElementById('avatar-upload').click()">Modifier la photo de profil</div>

            <div style="width: 100%; text-align: left; margin-bottom: 5px; font-size: 13px; color: var(--text-muted); font-weight: 600;">Nom d'utilisateur</div>
            <input type="text" id="edit-username" placeholder="Nom d'utilisateur" style="border:none; border-bottom:1px solid var(--border-color); border-radius:0; background:transparent; padding-left:0;">
            
            <div style="width: 100%; text-align: left; margin-top:15px; margin-bottom: 5px; font-size: 13px; color: var(--text-muted); font-weight: 600;">Bio</div>
            <textarea id="edit-bio" placeholder="Bio..." rows="3" style="border:none; border-bottom:1px solid var(--border-color); border-radius:0; background:transparent; padding-left:0; resize:none;"></textarea>
            
            <button class="text-only" style="color: #ed4956; margin-top: 40px;" onclick="logout()">Se déconnecter</button>
        </div>
    </div>

    <div id="public-profile-overlay" class="overlay">
        <header class="overlay-header">
            <div class="back-btn" onclick="closeOverlay('public-profile-overlay')"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg></div>
            <div id="public-header-username" style="font-weight: 600;"></div>
            <div style="width:40px;"></div> </header>
        <div class="overlay-content">
            <div class="profile-padding">
                <div class="profile-header">
                    <img id="public-avatar" class="avatar large" src="">
                    <div class="profile-stats-container">
                        <div><div class="stat-num" id="public-stat-posts">0</div><div class="stat-label">Posts</div></div>
                        <div><div class="stat-num" id="public-stat-followers">0</div><div class="stat-label">Abonnés</div></div>
                        <div><div class="stat-num" id="public-stat-following">0</div><div class="stat-label">Suivis</div></div>
                    </div>
                </div>

                <div class="profile-bio">
                    <strong id="public-username-bold"></strong>
                    <span id="public-bio"></span>
                </div>

                <div style="display:flex; gap:8px; margin-bottom: 20px;">
                    <button id="btn-follow" onclick="toggleFollow()" style="flex:1; padding:8px; border-radius:8px;">S'abonner</button>
                </div>
            </div>
            <div class="post-grid" id="public-post-grid"></div>
        </div>
    </div>

</div>

<script>
    // ==========================================
    // INITIALISATION SUPABASE
    // ==========================================
    const SUPABASE_URL = "https://ymuoiyfyvqpxokndhsuz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;
    let myProfile = null;
    let currentPublicProfileId = null; 
    let pendingEmail = "";
    let base64PostImage = null; // Stocke l'image prête à être postée
    
    const DEFAULT_AVATAR = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23dbdbdb'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/></svg>";

    // Helpers UI
    function setStatus(msg, isError = false) {
        const bar = document.getElementById('status-bar');
        bar.textContent = msg; bar.className = isError ? 'error visible' : 'visible';
        setTimeout(() => { bar.className = ''; }, 3500);
    }
    function showScreen(screenId) { document.querySelectorAll('.screen').forEach(el => el.classList.remove('active')); document.getElementById(screenId).classList.add('active'); }
    function switchAuthView(viewId) { document.querySelectorAll('.auth-container').forEach(el => el.style.display = 'none'); document.getElementById(viewId).style.display = 'flex'; }
    function switchTab(tabId, navElement) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        if (navElement) { document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active')); navElement.classList.add('active'); }
        if (tabId === 'profil') refreshMyProfileData();
        if (tabId === 'accueil') loadFeed();
    }
    function openOverlay(id) { document.getElementById(id).classList.add('active'); }
    function closeOverlay(id) { document.getElementById(id).classList.remove('active'); }

    // ==========================================
    // OPTIMISATION DES IMAGES (TRES IMPORTANT POUR BASE64)
    // ==========================================
    function resizeAndProcessImage(file, maxWidth, callback) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                // Compresse en JPEG à 80% pour économiser la base de données
                callback(canvas.toDataURL('image/jpeg', 0.8));
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    // ==========================================
    // AUTHENTIFICATION (EMAIL)
    // ==========================================
    async function login() {
        const email = document.getElementById('login-email').value.trim();
        const pwd = document.getElementById('login-password').value;
        if (!email || !pwd) return setStatus("Remplis tout", true);
        setStatus("Connexion...");
        const { error } = await sb.auth.signInWithPassword({ email, password: pwd });
        if (error) setStatus("Erreur : " + error.message, true);
    }

    async function startSignup() {
        const email = document.getElementById('signup-email').value.trim();
        const pwd = document.getElementById('signup-password').value;
        if (!email || !pwd) return setStatus("Remplis tout", true);
        setStatus("Création...");
        const { data, error } = await sb.auth.signUp({ email, password: pwd });
        if (error) setStatus("Erreur : " + error.message, true);
        else if (!data.session) { pendingEmail = email; switchAuthView('view-otp'); setStatus("Email de vérification envoyé !"); }
        else await loadMyProfile();
    }

    async function verifyOtp() {
        const token = document.getElementById('otp-code').value.trim();
        if (token.length < 6) return setStatus("Code à 6 chiffres", true);
        const { data, error } = await sb.auth.verifyOtp({ email: pendingEmail, token: token, type: 'signup' });
        if (error) setStatus("Code incorrect", true); else await refreshRealUser(data.session);
    }

    async function logout() { await sb.auth.signOut(); window.location.reload(); }

    // ==========================================
    // CHARGEMENT PROFIL INITIAL
    // ==========================================
    async function init() {
        const { data: { session } } = await sb.auth.getSession();
        refreshRealUser(session);
        sb.auth.onAuthStateChange((_event, session) => refreshRealUser(session));
    }

    async function refreshRealUser(session) {
        if (!session) { currentUser = null; myProfile = null; showScreen('auth-screen'); switchAuthView('view-login'); return; }
        currentUser = session.user;
        await loadMyProfile();
    }

    async function loadMyProfile() {
        if (!currentUser) return;
        const { data, error } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
        if (error || !data) showScreen('setup-profile-screen');
        else { myProfile = data; showApp(); }
    }

    async function saveUsername() {
        const username = document.getElementById('setup-username').value.trim();
        if (!username) return setStatus("Pseudo requis", true);
        const { error } = await sb.from('profiles').insert([{ id: currentUser.id, username, avatar_url: DEFAULT_AVATAR }]);
        if (error) setStatus("Pseudo déjà pris", true); else await loadMyProfile();
    }

    function showApp() { 
        showScreen('main-app'); 
        refreshMyProfileData();
        loadFeed(); // Charge les photos de tout le monde
    }

    // ==========================================
    // GESTION DU PROFIL (MODIFICATION)
    // ==========================================
    function handlePhotoUpload(event) {
        resizeAndProcessImage(event.target.files[0], 400, (base64) => {
            document.getElementById('edit-avatar-preview').src = base64;
            myProfile.avatar_url = base64;
        });
    }

    async function saveFullProfile() {
        const newUsername = document.getElementById('edit-username').value.trim();
        const newBio = document.getElementById('edit-bio').value.trim();
        if (!newUsername) return setStatus("Pseudo vide", true);
        setStatus("Enregistrement...");
        const { error } = await sb.from('profiles').update({ username: newUsername, bio: newBio, avatar_url: myProfile.avatar_url }).eq('id', currentUser.id);
        if (error) setStatus("Erreur lors de la sauvegarde", true);
        else { myProfile.username = newUsername; myProfile.bio = newBio; refreshMyProfileData(); closeOverlay('edit-profile-overlay'); setStatus("Profil mis à jour !"); }
    }

    async function refreshMyProfileData() {
        const avatarToUse = myProfile.avatar_url || DEFAULT_AVATAR;
        document.getElementById('my-profile-username').textContent = myProfile.username;
        document.getElementById('my-profile-bio').textContent = myProfile.bio || '';
        document.getElementById('my-avatar-preview').src = avatarToUse;
        document.getElementById('nav-my-avatar').src = avatarToUse;
        document.getElementById('edit-username').value = myProfile.username;
        document.getElementById('edit-bio').value = myProfile.bio || '';
        document.getElementById('edit-avatar-preview').src = avatarToUse;

        // Stats
        const { count: followersCount } = await sb.from('follows').select('*', { count: 'exact', head: true }).eq('following_id', currentUser.id);
        const { count: followingCount } = await sb.from('follows').select('*', { count: 'exact', head: true }).eq('follower_id', currentUser.id);
        document.getElementById('my-stat-followers').textContent = followersCount || 0;
        document.getElementById('my-stat-following').textContent = followingCount || 0;

        loadUserGrid(currentUser.id, 'my-post-grid', 'my-stat-posts');
    }

    // ==========================================
    // RECHERCHE D'UTILISATEURS
    // ==========================================
    async function searchUsers() {
        const query = document.getElementById('search-input').value.trim();
        const resultsContainer = document.getElementById('search-results');
        if (query.length < 1) { resultsContainer.innerHTML = ''; return; }
        const { data, error } = await sb.from('profiles').select('*').ilike('username', `%${query}%`).limit(15);
        if (error) return;
        resultsContainer.innerHTML = '';
        if(data.length === 0) return resultsContainer.innerHTML = '<p style="text-align:center; padding:20px; color:var(--text-muted);">Aucun résultat.</p>';

        data.forEach(user => {
            const div = document.createElement('div'); div.className = 'user-row'; div.onclick = () => openPublicProfile(user);
            div.innerHTML = `<img class="avatar" src="${user.avatar_url || DEFAULT_AVATAR}"><div class="user-info"><div class="username">${user.username}</div><div class="fullname">${user.bio ? user.bio.substring(0, 30) + '...' : ''}</div></div>`;
            resultsContainer.appendChild(div);
        });
    }

    // ==========================================
    // PROFIL PUBLIC & FOLLOWERS
    // ==========================================
    async function openPublicProfile(user) {
        if (user.id === currentUser.id) return switchTab('profil', document.querySelectorAll('.nav-item')[3]);
        currentPublicProfileId = user.id; 
        document.getElementById('public-header-username').textContent = user.username;
        document.getElementById('public-username-bold').textContent = user.username;
        document.getElementById('public-bio').textContent = user.bio || '';
        document.getElementById('public-avatar').src = user.avatar_url || DEFAULT_AVATAR;
        openOverlay('public-profile-overlay');
        
        // Follow Btn
        const { data } = await sb.from('follows').select('*').eq('follower_id', currentUser.id).eq('following_id', user.id).single();
        const btn = document.getElementById('btn-follow');
        if (data) { btn.textContent = "Suivi(e)"; btn.className = "secondary"; btn.style.background="transparent"; btn.style.color="var(--text-dark)"; } 
        else { btn.textContent = "S'abonner"; btn.className = ""; btn.style.background = "var(--primary)"; btn.style.color = "white"; }

        // Stats & Grid
        const { count: followersCount } = await sb.from('follows').select('*', { count: 'exact', head: true }).eq('following_id', user.id);
        const { count: followingCount } = await sb.from('follows').select('*', { count: 'exact', head: true }).eq('follower_id', user.id);
        document.getElementById('public-stat-followers').textContent = followersCount || 0;
        document.getElementById('public-stat-following').textContent = followingCount || 0;
        
        loadUserGrid(user.id, 'public-post-grid', 'public-stat-posts');
    }

    async function toggleFollow() {
        const btn = document.getElementById('btn-follow');
        if (btn.textContent === "Suivi(e)") {
            await sb.from('follows').delete().eq('follower_id', currentUser.id).eq('following_id', currentPublicProfileId);
            btn.textContent = "S'abonner"; btn.className = ""; btn.style.background = "var(--primary)"; btn.style.color = "white";
        } else {
            await sb.from('follows').insert([{ follower_id: currentUser.id, following_id: currentPublicProfileId }]);
            btn.textContent = "Suivi(e)"; btn.className = "secondary"; btn.style.background="transparent"; btn.style.color="var(--text-dark)";
        }
        // Maj manuelle rapide
        const statLabel = document.getElementById('public-stat-followers');
        statLabel.textContent = parseInt(statLabel.textContent) + (btn.textContent === "Suivi(e)" ? 1 : -1);
    }

    // ==========================================
    // SYSTEME DE POSTS & FIL D'ACTUALITE
    // ==========================================
    function openCreatePostOverlay() {
        base64PostImage = null;
        document.getElementById('create-post-preview').style.display = 'none';
        document.getElementById('create-post-preview').src = '';
        document.getElementById('post-caption').value = '';
        document.getElementById('post-image-upload').value = '';
        openOverlay('create-post-overlay');
    }

    function handlePostImageSelect(event) {
        // Redimensionne l'image pour qu'elle passe sur Supabase facilement (max 800px)
        resizeAndProcessImage(event.target.files[0], 800, (base64) => {
            base64PostImage = base64;
            document.getElementById('create-post-preview').src = base64;
            document.getElementById('create-post-preview').style.display = 'block';
        });
    }

    async function publishPost() {
        if (!base64PostImage) return setStatus("Choisis une photo !", true);
        const caption = document.getElementById('post-caption').value.trim();
        setStatus("Publication en cours...");
        
        const { error } = await sb.from('posts').insert([{ 
            user_id: currentUser.id, 
            image_url: base64PostImage, 
            caption: caption 
        }]);

        if (error) { setStatus("Erreur : " + error.message, true); } 
        else {
            setStatus("Publié !");
            closeOverlay('create-post-overlay');
            switchTab('accueil', document.querySelectorAll('.nav-item')[0]);
        }
    }

    // Charger le fil d'actualité global
    async function loadFeed() {
        const feedContainer = document.getElementById('feed-container');
        // Requête complexe : récupère les posts ET les infos du profil associé
        const { data, error } = await sb.from('posts').select(`*, profiles(username, avatar_url)`).order('created_at', { ascending: false }).limit(20);
        
        if (error || !data) { feedContainer.innerHTML = '<p style="text-align:center; margin-top:50px;">Erreur de chargement</p>'; return; }
        if (data.length === 0) { feedContainer.innerHTML = '<p style="text-align:center; margin-top:50px; color:var(--text-muted);">Aucun post pour le moment. Sois le premier !</p>'; return; }

        feedContainer.innerHTML = '';
        data.forEach(post => {
            const author = post.profiles || { username: 'inconnu', avatar_url: DEFAULT_AVATAR };
            const date = new Date(post.created_at).toLocaleDateString('fr-FR');
            
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <div class="post-header" onclick="openProfileByFeed('${post.user_id}', '${author.username}', '${author.avatar_url}')">
                    <img class="avatar" src="${author.avatar_url || DEFAULT_AVATAR}">
                    <div class="username">${author.username}</div>
                </div>
                <img class="post-image" src="${post.image_url}">
                <div class="post-actions">
                    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                </div>
                ${post.caption ? `<div class="post-caption"><strong>${author.username}</strong> ${post.caption}</div>` : ''}
                <div class="post-date">${date}</div>
            `;
            feedContainer.appendChild(card);
        });
    }

    // Charger les photos d'un utilisateur spécifique pour sa grille de profil
    async function loadUserGrid(userId, gridId, statId) {
        const grid = document.getElementById(gridId);
        const { data, count } = await sb.from('posts').select('id, image_url', { count: 'exact' }).eq('user_id', userId).order('created_at', { ascending: false });
        
        document.getElementById(statId).textContent = count || 0;
        grid.innerHTML = '';
        
        if (data && data.length > 0) {
            data.forEach(post => {
                const div = document.createElement('div');
                div.className = 'post-square';
                div.innerHTML = `<img src="${post.image_url}">`;
                grid.appendChild(div);
            });
        }
    }

    // Hack pour ouvrir le profil depuis le feed sans tout recharger
    function openProfileByFeed(id, username, avatar) {
        if(id === currentUser.id) return switchTab('profil', document.querySelectorAll('.nav-item')[3]);
        openPublicProfile({ id, username, avatar_url: avatar }); // Ouvre avec un objet simulé
    }

    window.onload = init;
</script>
</body>
</html>
