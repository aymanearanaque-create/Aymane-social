<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aymane Social</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--olive:rgb(128,128,0);
--olive2:rgb(150,150,40);
--bg:#f4f4e4;
--card:#ffffff;
--border:#d9d9a5;
--text:#2b2b18;
--muted:#777755;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
}

.hidden{display:none}

.topbar{
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:900;
color:var(--olive);
border-bottom:1px solid var(--border);
background:white;
}

.page{
padding:15px;
padding-bottom:90px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
padding:15px;
margin-bottom:15px;
}

button{
background:var(--olive);
border:none;
color:white;
padding:12px;
border-radius:12px;
width:100%;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:10px;
border:1px solid var(--border);
}

.bottomnav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:white;
border-top:1px solid var(--border);
display:grid;
grid-template-columns:repeat(5,1fr);
}

.navbtn{
border:none;
background:none;
font-size:12px;
color:var(--muted);
}

.navbtn.active{
color:var(--olive);
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
background:var(--olive);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:30px;
overflow:hidden;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.profileRow{
display:flex;
gap:15px;
align-items:center;
}

.msg{
background:#f6f6d9;
padding:10px;
border-radius:10px;
margin-top:8px;
}

</style>
</head>

<body>

<div class="topbar">Aymane Social</div>

<div id="home" class="page">

<div class="card">
Accueil style Instagram prêt.
</div>

</div>

<div id="search" class="page hidden">

<div class="card">

<input id="searchInput" placeholder="chercher pseudo">
<button onclick="searchUser()">Rechercher</button>

</div>

<div id="searchResults"></div>

</div>

<div id="messages" class="page hidden">

<div class="card">

<input id="dmUser" placeholder="pseudo">
<textarea id="dmText" placeholder="message"></textarea>
<button onclick="sendDM()">Envoyer</button>

</div>

<div id="dmList"></div>

</div>

<div id="reels" class="page hidden">

<div class="card">
Reels bientôt.
</div>

</div>

<div id="profile" class="page hidden">

<div class="card">

<div class="profileRow">

<div id="avatar" class="avatar">A</div>

<div>

<div id="fullname"></div>
<div id="username"></div>

<div>
<span id="followers">0</span> followers
•
<span id="following">0</span> following
</div>

</div>

</div>

<p id="bio"></p>

</div>

<div class="card">

<label>Photo</label>
<input type="file" id="photo">

<label>Prénom</label>
<input id="firstname">

<label>Nom</label>
<input id="lastname">

<label>Bio</label>
<textarea id="bioEdit"></textarea>

<button onclick="saveProfile()">Enregistrer</button>

</div>

</div>

<div class="bottomnav">

<button class="navbtn active" onclick="nav('home')">Accueil</button>
<button class="navbtn" onclick="nav('search')">Recherche</button>
<button class="navbtn" onclick="nav('messages')">Messages</button>
<button class="navbtn" onclick="nav('reels')">Reels</button>
<button class="navbtn" onclick="nav('profile')">Profil</button>

</div>

<script>

const SUPABASE_URL="https://ymuoiyfyvqpxokndhsuz.supabase.co"
const SUPABASE_KEY="sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY"

const supabase=supabase_js.createClient(SUPABASE_URL,SUPABASE_KEY)

let user=null
let profile=null

function nav(p){

document.querySelectorAll(".page").forEach(e=>e.classList.add("hidden"))
document.getElementById(p).classList.remove("hidden")

document.querySelectorAll(".navbtn").forEach(e=>e.classList.remove("active"))
event.target.classList.add("active")

}

async function loadProfile(){

const {data}=await supabase.auth.getUser()

user=data.user

const {data:prof}=await supabase
.from("profiles")
.select("*")
.eq("id",user.id)
.single()

profile=prof

document.getElementById("username").innerText="@"+prof.username
document.getElementById("fullname").innerText=prof.first_name+" "+prof.last_name
document.getElementById("bio").innerText=prof.bio

document.getElementById("firstname").value=prof.first_name
document.getElementById("lastname").value=prof.last_name
document.getElementById("bioEdit").value=prof.bio

if(prof.avatar_url){

document.getElementById("avatar").innerHTML="<img src='"+prof.avatar_url+"'>"

}

loadFollowers()

}

async function loadFollowers(){

const {count}=await supabase
.from("followers")
.select("*",{count:"exact",head:true})
.eq("following_id",user.id)

document.getElementById("followers").innerText=count

const {count:c2}=await supabase
.from("followers")
.select("*",{count:"exact",head:true})
.eq("follower_id",user.id)

document.getElementById("following").innerText=c2

}

async function saveProfile(){

let avatarURL=profile.avatar_url

const file=document.getElementById("photo").files[0]

if(file){

const name=user.id+"_"+Date.now()

await supabase.storage
.from("avatars")
.upload(name,file)

const {data}=supabase.storage
.from("avatars")
.getPublicUrl(name)

avatarURL=data.publicUrl

}

await supabase
.from("profiles")
.update({
first_name:document.getElementById("firstname").value,
last_name:document.getElementById("lastname").value,
bio:document.getElementById("bioEdit").value,
avatar_url:avatarURL
})
.eq("id",user.id)

loadProfile()

}

async function searchUser(){

const q=document.getElementById("searchInput").value

const {data}=await supabase
.from("profiles")
.select("*")
.ilike("username","%"+q+"%")

const div=document.getElementById("searchResults")

div.innerHTML=""

data.forEach(u=>{

div.innerHTML+=`

<div class="card">

<b>@${u.username}</b>

<button onclick="openProfile('${u.id}')">Voir profil</button>

<button onclick="startDM('${u.username}')">Message</button>

</div>

`

})

}

function startDM(username){

nav("messages")

document.getElementById("dmUser").value=username

}

async function sendDM(){

const username=document.getElementById("dmUser").value
const text=document.getElementById("dmText").value

const {data:target}=await supabase
.from("profiles")
.select("*")
.eq("username",username)
.single()

await supabase
.from("messages")
.insert({
sender_id:user.id,
receiver_id:target.id,
content:text
})

document.getElementById("dmText").value=""

loadDM()

}

async function loadDM(){

const {data}=await supabase
.from("messages")
.select("*")
.or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`)
.order("created_at",{ascending:false})

const div=document.getElementById("dmList")

div.innerHTML=""

data.forEach(m=>{

div.innerHTML+=`
<div class="msg">${m.content}</div>
`

})

}

loadProfile()

</script>

</body>
</html>
