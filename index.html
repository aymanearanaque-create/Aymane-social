<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aymane Social</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      color: #1c1e21;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      color: #1877f2;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
    }

    input,
    textarea,
    button {
      font: inherit;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d6dbe1;
      border-radius: 10px;
      margin: 8px 0;
      background: white;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      background: #1877f2;
      color: white;
      cursor: pointer;
    }

    button.secondary {
      background: #444;
    }

    button.danger {
      background: #d93025;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .profile-layout {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 14px;
    }

    .avatar-preview {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #1877f2;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
      overflow: hidden;
    }

    .post {
      border: 1px solid #e3e7ed;
      border-radius: 14px;
      padding: 14px;
      background: #fafbfc;
      margin-bottom: 14px;
    }

    .post-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 10px;
    }

    .post-user {
      font-weight: bold;
      color: #1877f2;
    }

    .post-date {
      font-size: 12px;
      color: #666;
    }

    .post-image {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 10px;
      border: 1px solid #e3e7ed;
    }

    .post-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
    }

    .comment-box {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }

    .comment {
      background: white;
      border: 1px solid #e6e6e6;
      border-radius: 10px;
      padding: 8px 10px;
      margin-top: 8px;
    }

    .message {
      background: #fafbfc;
      border: 1px solid #e3e7ed;
      border-radius: 12px;
      padding: 10px;
      margin-top: 10px;
    }

    .empty {
      color: #666;
      text-align: center;
      padding: 12px;
    }

    .small {
      font-size: 12px;
      color: #666;
    }

    @media (max-width: 700px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .profile-layout {
        grid-template-columns: 1fr;
      }

      .avatar-preview {
        margin: 0 auto;
      }

      .actions button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>Aymane Social</h1>
      <div class="topbar-actions">
        <span id="authStatus">Non connecté</span>
        <button id="logoutBtn" class="secondary">Déconnexion</button>
      </div>
    </header>

    <section class="card">
      <h2>Connexion / Inscription</h2>
      <div class="grid-2">
        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Mot de passe" />
      </div>
      <div class="actions">
        <button id="signupBtn">Créer un compte</button>
        <button id="signinBtn">Se connecter</button>
      </div>
    </section>

    <section class="card">
      <h2>Mon profil</h2>
      <div class="profile-layout">
        <div class="avatar-preview" id="avatarPreview">A</div>
        <div>
          <input type="text" id="username" placeholder="Pseudo" maxlength="30" />
          <input type="text" id="avatarUrl" placeholder="Lien image profil (optionnel)" />
          <textarea id="bio" placeholder="Bio" maxlength="160"></textarea>
          <div class="actions">
            <button id="saveProfileBtn">Enregistrer le profil</button>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Nouveau post</h2>
      <textarea id="postContent" placeholder="Écris quelque chose..." maxlength="500"></textarea>
      <input type="text" id="postImageUrl" placeholder="Lien image (optionnel)" />
      <div class="actions">
        <button id="addPostBtn">Publier</button>
      </div>
      <div class="small">Texte obligatoire. Image facultative par lien URL.</div>
    </section>

    <section class="card">
      <h2>Fil d’actualité</h2>
      <div id="feed"></div>
    </section>

    <section class="card">
      <h2>Messagerie simple</h2>
      <input type="text" id="messageReceiver" placeholder="Pseudo du destinataire" />
      <textarea id="messageContent" placeholder="Ton message..."></textarea>
      <div class="actions">
        <button id="sendMessageBtn">Envoyer</button>
        <button id="loadMessagesBtn" class="secondary">Actualiser les messages</button>
      </div>
      <div id="messagesBox"></div>
    </section>
  </div>

  <script>
    const SUPABASE_URL = "https://ymuoiyfyvqpxokndhsuz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const authStatus = document.getElementById("authStatus");
    const feed = document.getElementById("feed");
    const messagesBox = document.getElementById("messagesBox");

    document.getElementById("signupBtn").addEventListener("click", signUp);
    document.getElementById("signinBtn").addEventListener("click", signIn);
    document.getElementById("logoutBtn").addEventListener("click", signOut);
    document.getElementById("saveProfileBtn").addEventListener("click", saveProfile);
    document.getElementById("addPostBtn").addEventListener("click", addPost);
    document.getElementById("sendMessageBtn").addEventListener("click", sendMessage);
    document.getElementById("loadMessagesBtn").addEventListener("click", loadMessages);

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.innerText = text || "";
      return div.innerHTML;
    }

    function renderAvatarPreview(username, avatarUrl) {
      const avatarPreview = document.getElementById("avatarPreview");
      if (avatarUrl) {
        avatarPreview.innerHTML = '<img src="' + escapeHtml(avatarUrl) + '" alt="avatar" style="width:100%;height:100%;object-fit:cover;">';
      } else {
        avatarPreview.textContent = (username || "A").charAt(0).toUpperCase();
      }
    }

    async function getCurrentUser() {
      const { data } = await client.auth.getUser();
      return data.user || null;
    }

    async function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Entre un email et un mot de passe.");
        return;
      }

      const { data, error } = await client.auth.signUp({ email, password });

      if (error) {
        alert(error.message);
        return;
      }

      if (data.user) {
        const defaultUsername = email.split("@")[0];

        const { error: profileError } = await client.from("profiles").upsert({
          id: data.user.id,
          username: defaultUsername,
          avatar_url: "",
          bio: ""
        });

        if (profileError) {
          alert(profileError.message);
          return;
        }
      }

      alert("Compte créé.");
      await refreshUI();
    }

    async function signIn() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        alert("Entre un email et un mot de passe.");
        return;
      }

      const { error } = await client.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert(error.message);
        return;
      }

      alert("Connexion réussie.");
      await refreshUI();
    }

    async function signOut() {
      const { error } = await client.auth.signOut();

      if (error) {
        alert(error.message);
        return;
      }

      await refreshUI();
    }

    async function saveProfile() {
      const user = await getCurrentUser();

      if (!user) {
        alert("Connecte-toi d'abord.");
        return;
      }

      const username = document.getElementById("username").value.trim();
      const avatar_url = document.getElementById("avatarUrl").value.trim();
      const bio = document.getElementById("bio").value.trim();

      if (!username) {
        alert("Entre un pseudo.");
        return;
      }

      const { error } = await client.from("profiles").upsert({
        id: user.id,
        username,
        avatar_url,
        bio
      });

      if (error) {
        alert(error.message);
        return;
      }

      renderAvatarPreview(username, avatar_url);
      alert("Profil enregistré.");
      await loadFeed();
      await loadMessages();
    }

    async function loadMyProfile() {
      const user = await getCurrentUser();

      if (!user) {
        document.getElementById("username").value = "";
        document.getElementById("avatarUrl").value = "";
        document.getElementById("bio").value = "";
        renderAvatarPreview("A", "");
        return;
      }

      const { data, error } = await client
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .maybeSingle();

      if (error || !data) {
        return;
      }

      document.getElementById("username").value = data.username || "";
      document.getElementById("avatarUrl").value = data.avatar_url || "";
      document.getElementById("bio").value = data.bio || "";
      renderAvatarPreview(data.username, data.avatar_url);
    }

    async function addPost() {
      const user = await getCurrentUser();

      if (!user) {
        alert("Connecte-toi d'abord.");
        return;
      }

      const content = document.getElementById("postContent").value.trim();
      const image_url = document.getElementById("postImageUrl").value.trim();

      if (!content) {
        alert("Écris un message.");
        return;
      }

      const { error } = await client.from("posts").insert({
        user_id: user.id,
        content,
        image_url
      });

      if (error) {
        alert(error.message);
        return;
      }

      document.getElementById("postContent").value = "";
      document.getElementById("postImageUrl").value = "";
      await loadFeed();
    }

    async function toggleLike(postId) {
      const user = await getCurrentUser();

      if (!user) {
        alert("Connecte-toi d'abord.");
        return;
      }

      const { data: existing, error: checkError } = await client
        .from("likes")
        .select("id")
        .eq("post_id", postId)
        .eq("user_id", user.id)
        .maybeSingle();

      if (checkError) {
        alert(checkError.message);
        return;
      }

      if (existing) {
        const { error } = await client.from("likes").delete().eq("id", existing.id);
        if (error) {
          alert(error.message);
          return;
        }
      } else {
        const { error } = await client.from("likes").insert({
          post_id: postId,
          user_id: user.id
        });
        if (error) {
          alert(error.message);
          return;
        }
      }

      await loadFeed();
    }

    async function addComment(postId) {
      const user = await getCurrentUser();

      if (!user) {
        alert("Connecte-toi d'abord.");
        return;
      }

      const input = document.getElementById("comment-input-" + postId);
      const content = input.value.trim();

      if (!content) {
        alert("Écris un commentaire.");
        return;
      }

      const { error } = await client.from("comments").insert({
        post_id: postId,
        user_id: user.id,
        content
      });

      if (error) {
        alert(error.message);
        return;
      }

      input.value = "";
      await loadFeed();
    }

    async function deletePost(postId) {
      const user = await getCurrentUser();

      if (!user) {
        return;
      }

      const ok = confirm("Supprimer ce post ?");
      if (!ok) return;

      const { error } = await client.from("posts").delete().eq("id", postId);

      if (error) {
        alert(error.message);
        return;
      }

      await loadFeed();
    }

    async function loadFeed() {
      feed.innerHTML = '<div class="empty">Chargement...</div>';

      const user = await getCurrentUser();

      const { data: posts, error } = await client
        .from("posts")
        .select(`
          id,
          content,
          image_url,
          created_at,
          user_id,
          profiles (
            username,
            avatar_url
          )
        `)
        .order("created_at", { ascending: false });

      if (error) {
        feed.innerHTML = '<div class="empty">Erreur de chargement.</div>';
        return;
      }

      if (!posts || posts.length === 0) {
        feed.innerHTML = '<div class="empty">Aucun post pour le moment.</div>';
        return;
      }

      feed.innerHTML = "";

      for (const post of posts) {
        const profile = Array.isArray(post.profiles) ? post.profiles[0] : post.profiles;
        const username = profile?.username || "Utilisateur";
        const avatarUrl = profile?.avatar_url || "";
        const date = new Date(post.created_at).toLocaleString("fr-FR");

        const { data: likesData } = await client
          .from("likes")
          .select("id, user_id")
          .eq("post_id", post.id);

        const { data: commentsData } = await client
          .from("comments")
          .select(`
            id,
            content,
            created_at,
            user_id,
            profiles (
              username
            )
          `)
          .eq("post_id", post.id)
          .order("created_at", { ascending: true });

        const likesCount = likesData ? likesData.length : 0;
        const isLiked = !!likesData?.find(like => like.user_id === user?.id);
        const canDelete = user && user.id === post.user_id;

        const postEl = document.createElement("div");
        postEl.className = "post";

        const avatarHtml = avatarUrl
          ? '<img src="' + escapeHtml(avatarUrl) + '" alt="avatar" style="width:40px;height:40px;border-radius:50%;object-fit:cover;">'
          : '<div style="width:40px;height:40px;border-radius:50%;background:#1877f2;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;">' + escapeHtml(username.charAt(0).toUpperCase()) + '</div>';

        const commentsHtml = (commentsData || []).map(comment => {
          const cProfile = Array.isArray(comment.profiles) ? comment.profiles[0] : comment.profiles;
          const cName = cProfile?.username || "Utilisateur";
          return `
            <div class="comment">
              <strong>${escapeHtml(cName)}</strong><br>
              ${escapeHtml(comment.content)}
            </div>
          `;
        }).join("");

        postEl.innerHTML = `
          <div class="post-header">
            <div style="display:flex;align-items:center;gap:10px;">
              ${avatarHtml}
              <div>
                <div class="post-user">${escapeHtml(username)}</div>
                <div class="post-date">${date}</div>
              </div>
            </div>
            ${canDelete ? `<button class="danger" onclick="deletePost(${post.id})">Supprimer</button>` : ""}
          </div>

          <div>${escapeHtml(post.content)}</div>

          ${post.image_url ? `<img class="post-image" src="${escapeHtml(post.image_url)}" alt="image post">` : ""}

          <div class="post-actions">
            <button onclick="toggleLike(${post.id})">${isLiked ? "Je n’aime plus" : "J’aime"}</button>
            <span>${likesCount} j’aime</span>
          </div>

          <div class="comment-box">
            <input id="comment-input-${post.id}" type="text" placeholder="Ajouter un commentaire..." />
            <div class="actions">
              <button onclick="addComment(${post.id})">Commenter</button>
            </div>
            ${commentsHtml || `<div class="empty">Pas encore de commentaires.</div>`}
          </div>
        `;

        feed.appendChild(postEl);
      }
    }

    async function sendMessage() {
      const user = await getCurrentUser();

      if (!user) {
        alert("Connecte-toi d'abord.");
        return;
      }

      const receiverUsername = document.getElementById("messageReceiver").value.trim();
      const content = document.getElementById("messageContent").value.trim();

      if (!receiverUsername || !content) {
        alert("Entre un destinataire et un message.");
        return;
      }

      const { data: receiver, error: receiverError } = await client
        .from("profiles")
        .select("id, username")
        .eq("username", receiverUsername)
        .maybeSingle();

      if (receiverError || !receiver) {
        alert("Destinataire introuvable.");
        return;
      }

      const { error } = await client.from("messages").insert({
        sender_id: user.id,
        receiver_id: receiver.id,
        content
      });

      if (error) {
        alert(error.message);
        return;
      }

      document.getElementById("messageContent").value = "";
      await loadMessages();
    }

    async function loadMessages() {
      const user = await getCurrentUser();

      if (!user) {
        messagesBox.innerHTML = '<div class="empty">Connecte-toi pour voir les messages.</div>';
        return;
      }

      const { data, error } = await client
        .from("messages")
        .select(`
          id,
          content,
          created_at,
          sender_id,
          receiver_id
        `)
        .order("created_at", { ascending: false })
        .limit(20);

      if (error) {
        messagesBox.innerHTML = '<div class="empty">Erreur de chargement des messages.</div>';
        return;
      }

      if (!data || data.length === 0) {
        messagesBox.innerHTML = '<div class="empty">Aucun message.</div>';
        return;
      }

      const profileIds = [...new Set(data.flatMap(m => [m.sender_id, m.receiver_id]))];

      const { data: profileList } = await client
        .from("profiles")
        .select("id, username")
        .in("id", profileIds);

      const profileMap = {};
      (profileList || []).forEach(p => {
        profileMap[p.id] = p.username;
      });

      messagesBox.innerHTML = "";

      data.forEach(msg => {
        const senderName = profileMap[msg.sender_id] || "Utilisateur";
        const receiverName = profileMap[msg.receiver_id] || "Utilisateur";
        const date = new Date(msg.created_at).toLocaleString("fr-FR");

        const div = document.createElement("div");
        div.className = "message";
        div.innerHTML = `
          <strong>${escapeHtml(senderName)}</strong> → <strong>${escapeHtml(receiverName)}</strong><br>
          ${escapeHtml(msg.content)}<br>
          <small>${date}</small>
        `;
        messagesBox.appendChild(div);
      });
    }

    async function refreshUI() {
      const user = await getCurrentUser();
      authStatus.textContent = user ? "Connecté : " + user.email : "Non connecté";
      await loadMyProfile();
      await loadFeed();
      await loadMessages();
    }

    client.auth.onAuthStateChange(async () => {
      await refreshUI();
    });

    window.toggleLike = toggleLike;
    window.addComment = addComment;
    window.deletePost = deletePost;

    refreshUI();
  </script>
</body>
</html>
