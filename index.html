<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AymaneSocial</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --olive: #556B2F; --bg: #f4f7f2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #e0e0e0; height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 480px; height: 100%; background: white; display: flex; flex-direction: column; position: relative; }
        .screen { flex-grow: 1; overflow-y: auto; display: none; background: var(--bg); padding-bottom: 70px; }
        .screen.active { display: block; }
        .hidden { display: none !important; }
        .btn { background: var(--olive); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-outline { background: transparent; color: var(--olive); border: 1px solid var(--olive); }
        input { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; }
        .auth-container { padding: 40px 30px; height: 100%; display: flex; flex-direction: column; justify-content: center; background: white;}
    </style>
</head>
<body>

    <div id="app">
        <div id="screen-auth" class="screen active">
            <div class="auth-container">
                <h1 style="color: var(--olive); text-align: center; margin-bottom: 30px;">AymaneSocial</h1>
                
                <input type="email" id="auth-email" placeholder="Email" required>
                <input type="password" id="auth-password" placeholder="Mot de passe" required>
                
                <button class="btn" onclick="loginUser()">Se connecter</button>
                <button class="btn btn-outline" onclick="registerUser()">Créer un compte</button>
            </div>
        </div>

        <div id="screen-home" class="screen">
            <div style="padding: 20px; text-align: center; margin-top: 50px;">
                <h2 style="color: var(--olive);">✅ Connexion Réussie !</h2>
                <p style="margin-top: 10px; color: #555;">Bienvenue sur ton application AymaneSocial.</p>
                <button class="btn" onclick="logoutUser()" style="margin-top: 30px;">Me déconnecter</button>
            </div>
        </div>
    </div>

    <script>
        // ON TESTE SI LE BOUTON MARCHE DES LE DEBUT
        alert("L'application a bien été mise à jour !");

        // TES VRAIES CLES SUPABASE (Avec le 'h' minuscule corrigé)
        const SUPABASE_URL = "https://ymuoiyfyvqpxokndhsuz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_LVVb8iWlaJAuMa4D_LLiYg_DTe2KpyY";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // FONCTION DE CONNEXION
        async function loginUser() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            
            if (!email || !password) return alert("Remplis l'email et le mot de passe !");

            alert("Tentative de connexion en cours...");
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("Erreur de connexion : " + error.message);
            } else {
                document.getElementById('screen-auth').classList.remove('active');
                document.getElementById('screen-home').classList.add('active');
            }
        }

        // FONCTION D'INSCRIPTION
        async function registerUser() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            
            if (!email || !password) return alert("Remplis l'email et le mot de passe !");
            
            alert("Création du compte en cours...");
            
            const { data, error } = await supabase.auth.signUp({ email, password });
            
            if (error) {
                alert("Erreur d'inscription : " + error.message);
            } else {
                alert("✅ Compte créé ! Tu peux maintenant te connecter.");
            }
        }

        // FONCTION DE DECONNEXION
        async function logoutUser() {
            await supabase.auth.signOut();
            document.getElementById('screen-home').classList.remove('active');
            document.getElementById('screen-auth').classList.add('active');
            alert("Tu es déconnecté.");
        }
    </script>
</body>
</html>
